{% load wagtailcore_tags navigation_tags wagtailuserbar %}
<header>
    {% get_site_root as site_root %}
    <nav class="blur-nav navbar navbar-expand-lg fixed-top">
        <div class="container ">
            <a class="project-icon navbar-brand-custom"
               href="{% pageurl site_root %}"><i class="fa-solid fa-meteor"></i></a>
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href=""></a>
                    </li>
                    {% for menuitem in site_root.get_children.live.in_menu %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% pageurl menuitem %}">{{ menuitem.title }}</a>
                        </li>
                    {% endfor %}
                    <li>
                        <a class="nav-link" href="/search/">Search</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% wagtailuserbar "bottom-right" %}
</header>
