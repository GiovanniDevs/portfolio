{% extends "base.html" %}
{% load wagtailcore_tags %}
{% block content %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col">
                <h1>{{ page.title }}</h1>
                <div>{{ page.intro|richtext }}</div>
                <form class="page-form" action="{% pageurl page %}" method="POST">
                    {% csrf_token %}
                    {{ form.as_div }}
                    <button type="Submit">Submit</button>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
